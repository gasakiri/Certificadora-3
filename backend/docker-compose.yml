services:

  api:
    build: .

    container_name: impactometro_api

    environment:
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB: impactometro_db

    ports:
      - "5000:5000"

    depends_on:
      - mongo

    restart: always

  mongo:
    image: mongo:7

    container_name: impactometro_mongo

    volumes:
      - mongo_data:/data/db

    restart: always

volumes:
  mongo_data:
